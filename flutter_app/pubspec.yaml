name: flutter_app
description: A bio-inspired phishing URL evolution tracker — PhishEvo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase core stack
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Google Sign-In + Maps
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.9.0

  # Networking + State management
  http: ^1.2.2
  provider: ^6.1.2

  # UI + Charts + Animation
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  
  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
